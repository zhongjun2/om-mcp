tool:
  name: get_community_contribute
  description: |
    查询指定社区的按月贡献历史序列，包含每月的提交的 PR 数、合并的 PR 数、提交的 Issue 数、活跃用户数、合并 PR 用户数。
    返回从建社至今的完整月度数据列表，不支持时间范围过滤。
    适合：趋势分析、历史对比、汇总某年/某月数据。
    若只需特定时间段的聚合统计（如合并率、响应时长），请改用 get_prs_aggregate 或 get_issues_aggregate。

http:
  method: get
  path: /stats/contribute
  use_extract_data: false
  path_params: []
  constant_params: {}

params:
  - name: community
    type: str
    required: true
    description: "社区名称，如 openEuler、MindSpore 等"
    in: query
    conditional: false
    community_map: false

empty_data_message: "暂无贡献指标数据"

response:
  type: custom
  formatter: format_community_contribute
